<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="https://fullsdm.com/assets/images/favicon.ico" />

    <link rel="stylesheet" href="https://fullsdm.com/style/base/normalize.css" />
    <link rel="stylesheet" href="https://fullsdm.com/style/fonts/rajdhani.css" />
    <link rel="stylesheet" href="https://fullsdm.com/style/fonts/roboto.css" />
    <link rel="stylesheet" href="https://fullsdm.com/style/index.css" />

    <title>FullSDM</title>
  </head>
  <body>
    <header class="header">
      <div class="header__left">
        <img src="https://fullsdm.com/assets/images/logotipo.jpg" alt="Logotipo de FullSDM" class="header__logotipo" />
      </div>
      <div class="header__center">
        <ul class="header__list">
          <li class="header__item">
            <a href="#" class="header__link">Inicio</a>
          </li>
          <li class="header__item">
            <a href="#" class="header__link">Proyectos</a>
          </li>
          <li class="header__item">
            <a href="#" class="header__link">Contacto</a>
          </li>
        </ul>
      </div>
      <div class="header__right">
        <button class="header__button">MODE</button>
      </div>
    </header>
    <main class="main">
      <section class="main__section">
        <div class="main__section-photo">
          <img src="https://fullsdm.com/assets/photos/fullsdm.jpg" alt="Foto de FullSDM" class="section__photo" />
        </div>
        <div class="main__section-info">
          <h1 class="section__name">Jorge Jiménez</h1>
          <h2 class="section__job">Upcoming developer</h2>
          <p class="section__bio">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Perspiciatis, quas placeat repellendus iusto aliquam reiciendis!</p>
          <div class="section__networks">
            <a href="#" class="section__networks-link">GitHub</a>
            <a href="#" class="section__networks-link">Linkedin</a>
            <a href="#" class="section__networks-link">Email</a>
          </div>
        </div>
      </section>
    </main>
    <script src="script/index.js"></script>
  </body>
</html>
