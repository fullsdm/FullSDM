<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="assets/images/favicon.ico" />

    <link rel="stylesheet" href="style/base/normalize.css" />
    <link rel="stylesheet" href="style/fonts/rajdhani.css" />
    <link rel="stylesheet" href="style/fonts/roboto.css" />
    <link rel="stylesheet" href="style/index.css" />

    <title>FullSDM</title>
  </head>
  <body>
    <header class="header">
      <div class="header__left">
        <img src="assets/images/logotipo.jpg" alt="Logotipo de FullSDM" class="header__logotipo" />
      </div>

      <div class="header__center">
        <ul class="header__list">
          <li class="header__item"><a href="https://fullsdm.com/" class="header__link">Inicio</a></li>
          <li class="header__item"><a href="https://fullsdm.com/" class="header__link">Proyectos</a></li>
          <li class="header__item"><a href="https://fullsdm.com/" class="header__link">Contacto</a></li>
        </ul>
      </div>

      <div class="header__right">
        <button class="header__button">MODE</button>
      </div>
    </header>

    <main class="main">
      <section class="main__section">
        <div class="main__section-photo">
          <img src="assets/photos/fullsdm.jpg" alt="Foto de FullSDM" class="section__photo" />
        </div>

        <div class="main__section-info">
          <h1 class="section__name">Jorge Jiménez</h1>
          <h2 class="section__job">Upcoming developer</h2>
          <p class="section__bio">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Perspiciatis, quas placeat repellendus iusto aliquam reiciendis!</p>
          <div class="section__networks">
            <button class="section__button">GitHub</button>
            <button class="section__button">Linkedin</button>
            <button class="section__button">Email</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__copyright">2024 &copy; FullSDM</p>
    </footer>
    <script src="script/index.js"></script>
  </body>
</html>
