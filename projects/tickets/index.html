<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Tickets</title>
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">ADA 13</h1>
    </header>
    <main class="main">
      <section class="main__section">
        <div class="main__section-ticket">
          <img src="ticket-image.png" alt="Imagen del ticket" class="main__section-ticket-image" />
          <h3 class="main__section-ticket-name">TICKET</h3>
          <p class="main__section-ticket-description">info</p>
          <p class="main__section-ticket-price">$7 USD</p>
          <button class="main__section-ticket-button">Comprar</button>
        </div>
      </section>
    </main>
  </body>
</html>
