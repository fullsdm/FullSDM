<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculador</title>
  </head>

  <body>
    <main>
      <form action="">
        <div>
          <p>Numero 1</p>
          <input type="number" name="num_1" id="num_1" />
        </div>
        <div>
          <p>Numero 2</p>
          <input type="number" name="num_2" id="num_2" />
        </div>
        <div>
          <p id="resultado"></p>
        </div>
        <br /><br />
        <div>
          <select name="operacion" id="operacion">
            <option value="1">Seleccione</option>
            <option value="2">Suma</option>
            <option value="3">Resta</option>
            <option value="4">multiplicacion</option>
            <option value="5">Division</option>
          </select>
        </div>
        <br /><br />
        <button type="button" id="sumar">Calcular</button>
      </form>
    </main>
    <script src="script.js"></script>
  </body>
</html>
