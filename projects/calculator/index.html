<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <header class="header">
      <h1 class="header__name">Calculator</h1>
    </header>
    <main class="main">
        <div class="main__calculator">
            <form action="">
                <input type="number" name="" id="" class="main__input">
                <button class="main__button">CE</button>
                <button class="main__button">/</button>
                <button class="main__button">*</button>
                <button class="main__button">-</button>
                <button class="main__button">7</button>
                <button class="main__button">8</button>
                <button class="main__button">9</button>
                <button class="main__button">+</button>
                <button class="main__button">4</button>
                <button class="main__button">5</button>
                <button class="main__button">6</button>
                <button class="main__button">1</button>
                <button class="main__button">2</button>
                <button class="main__button">3</button>
                <button class="main__button">0</button>
                <button class="main__button">.</button>
                <button class="main__button">Enter</button>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
